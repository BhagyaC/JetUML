name: Scorecard supply-chain security

on:
  branch_protection_rule:
  schedule:
    - cron: "23 6 * * 2"
  push:
    branches:
      - master
      - main
  workflow_dispatch:

permissions: read-all

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest

    # Scorecard publish_results works from the default branch.
    if: github.event.repository.default_branch == github.ref_name || github.event_name == 'branch_protection_rule'

    permissions:
      contents: read
      actions: read
      security-events: write
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Run Scorecard analysis
        uses: ossf/scorecard-action@v2.4.2
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true

          # Uncomment this for private repositories, or for stronger Branch-Protection checks.
          # repo_token: ${{ secrets.SCORECARD_TOKEN }}

          # Uncomment if your .gitattributes marks files with export-ignore.
          # file_mode: git

      - name: Upload SARIF artifact
        uses: actions/upload-artifact@v6
        with:
          name: scorecard-sarif
          path: results.sarif
          retention-days: 5
          if-no-files-found: error

      - name: Upload SARIF to code scanning
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: results.sarif
